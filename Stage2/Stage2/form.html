<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>
<body>
    <form action="https://formspree.io/f/xjgpqrqe" method="post">
      <fieldset>
        <legend>Form for Stage 2 Task</legend>
        
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="John" minlength="2" name="First Name" required>

        <label for="secondName">Second Name</label>
        <input type="text" id="secondName" placeholder="Mactavish" minlength="2" name="Second Name" required>

        <label for="mail">Mail</label>
        <input type="email" id="mail" placeholder="example@gmail.com" name="Email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" pattern="\+375\s?\d{2}\s?\d{3}\s?\d{2}\s?\d{2}" placeholder="+375777777777" id="phone" name="Phone Number" required>

        <label for="programming-language">Choose a programming language</label>
        <select name="Programming Language" id="programming-language" required> 
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JS</option>
        </select>

        <label for="randomNumbers"></label>
        <input type="text" id="randomNumbers" value="42" pattern="\d{2}" maxlength="2" name="Random Number" required>

        <input type="radio" id="favorite-library-react" name="favorite-library" value="React" class="tech-item" required>
        <label for="favorite-library-react">React</label><br>

        <input type="radio" id="favorite-library-angular" name="favorite-library" value="Angular"  class="tech-item" required>
        <label for="favorite-library-angular">Angular</label><br>

        <p><label for="review">Напишите впечатления о языке программирования</label></p>
        <textarea id="review" name="review" rows="3" cols="30" placeholder="-Сколько будет яблоко + одно? - Одно яблоко - Твой родной язык JavaScript что-ли?" name="Review" required></textarea><br>

        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="******" name="Password" required>

        <label for="inactive">Inactive</label>
        <input type="text" id="inactive" disabled>

        <input type="checkbox" id="apple" name="apple" value="apple" class="tech-item">
        <label for="apple">Apple</label><br>

        <input type="checkbox" id="windows" name="windows" value="windows" class="tech-item">
        <label for="windows">Windows</label><br>

        <input type="checkbox" id="linux" name="linux" value="linux" class="tech-item">
        <label for="linux">Linux</label><br>

        <input type="submit" value="Submit" id="submit">
      </fieldset>
    </form>
</body>
</html>
