name: Deploy
on:
  push:
    branches: ['*']
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: |
          mkdir -p public
          # Копируем всё содержимое в корень public
          # ВАЖНО: мы не создаем папки для веток, а всё льем в корень
          cp -r * public/
          # Создаем простейший index.html, если его нет
          echo "<h1>Привет! Сайт работает.</h1>" > public/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
      - uses: actions/deploy-pages@v4
