<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Navigation menu</title>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="nav-container__logo-container">
                <a href="#" class="logo-container__logo-link">
                    <img src="/assets/images/favicon.png" alt="logo" class="logo-link__image">
                    <p class="logo-link__text">company</p>
                </a>
            </div>
            <div class="nav-container__links-avatar-container">
                <input type="checkbox" id="burger-menu" class="burger-menu-checkbox">
                <label for="burger-menu" class="burger-menu-icon">&#9776;</label>
                <nav class="nav-container__links-container">
                    <ul class="links-container__links">
                        <li><a href="#" active>Home</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Gallery</a></li>
                        <li><a href="#">Contacts</a></li>
                    </ul>
                </nav>
                <div class="nav-container__avatar-container">
                    <a href="#" class="avatar-container__avatar-link">
                        <img src="/assets/images/chicken.png" alt="avatar">
                    </a>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
